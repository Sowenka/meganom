<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Новое сообщение — Меганом Эко-дом</title>
</head>
<body style="margin:0;padding:0;background:#F0EDE6;font-family:Georgia,serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F0EDE6;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background:#1B3A4B;border-radius:16px 16px 0 0;padding:36px 40px;text-align:center;">
              <p style="margin:0 0 4px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#C9A96E;font-family:Georgia,serif;">
                ЭКО ДОМ
              </p>
              <h1 style="margin:0;font-size:28px;font-weight:bold;color:#ffffff;font-family:Georgia,serif;letter-spacing:2px;">
                МЕГАНОМ
              </h1>
            </td>
          </tr>

          <!-- Gold bar -->
          <tr>
            <td style="background:#C9A96E;height:3px;"></td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px;">

              <h2 style="margin:0 0 8px;font-size:22px;color:#1B3A4B;font-family:Georgia,serif;font-weight:bold;">
                Новое сообщение с сайта
              </h2>
              <p style="margin:0 0 32px;font-size:13px;color:#9CA3AF;font-family:Arial,sans-serif;letter-spacing:1px;text-transform:uppercase;">
                Контактная форма · meganom-hotel.ru
              </p>

              <!-- Info grid -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td style="padding:12px 16px;background:#FAFAF7;border-radius:10px;border-left:3px solid #C9A96E;margin-bottom:10px;">
                    <p style="margin:0 0 2px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-family:Arial,sans-serif;">Имя</p>
                    <p style="margin:0;font-size:16px;color:#1B3A4B;font-family:Georgia,serif;font-weight:bold;">{{from_name}}</p>
                  </td>
                </tr>
              </table>

              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:10px;">
                <tr>
                  <td width="48%" style="padding:12px 16px;background:#FAFAF7;border-radius:10px;border-left:3px solid #C9A96E;">
                    <p style="margin:0 0 2px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-family:Arial,sans-serif;">Email</p>
                    <p style="margin:0;font-size:14px;color:#2C2C2C;font-family:Arial,sans-serif;">{{from_email}}</p>
                  </td>
                  <td width="4%"></td>
                  <td width="48%" style="padding:12px 16px;background:#FAFAF7;border-radius:10px;border-left:3px solid #C9A96E;">
                    <p style="margin:0 0 2px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-family:Arial,sans-serif;">Телефон</p>
                    <p style="margin:0;font-size:14px;color:#2C2C2C;font-family:Arial,sans-serif;">{{from_phone}}</p>
                  </td>
                </tr>
              </table>

              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;margin-top:10px;">
                <tr>
                  <td style="padding:12px 16px;background:#FAFAF7;border-radius:10px;border-left:3px solid #C9A96E;">
                    <p style="margin:0 0 2px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-family:Arial,sans-serif;">Тема</p>
                    <p style="margin:0;font-size:15px;color:#1B3A4B;font-family:Georgia,serif;">{{subject}}</p>
                  </td>
                </tr>
              </table>

              <!-- Message -->
              <p style="margin:0 0 10px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-family:Arial,sans-serif;">
                Сообщение
              </p>
              <div style="background:#FAFAF7;border-radius:10px;padding:20px;border:1px solid #F0EDE6;">
                <p style="margin:0;font-size:15px;line-height:1.7;color:#2C2C2C;font-family:Arial,sans-serif;white-space:pre-wrap;">{{message}}</p>
              </div>

              <!-- CTA -->
              <div style="margin-top:32px;text-align:center;">
                <a href="mailto:{{from_email}}" style="display:inline-block;background:#C9A96E;color:#ffffff;font-family:Arial,sans-serif;font-size:14px;font-weight:bold;padding:14px 32px;border-radius:50px;text-decoration:none;letter-spacing:1px;">
                  Ответить гостю
                </a>
              </div>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#1B3A4B;border-radius:0 0 16px 16px;padding:24px 40px;text-align:center;">
              <p style="margin:0 0 6px;font-size:12px;color:#ffffff;font-family:Georgia,serif;">
                Меганом Эко-дом · мыс Меганом, Крым
              </p>
              <p style="margin:0;font-size:11px;color:#ffffff50;font-family:Arial,sans-serif;">
                Это автоматическое уведомление с сайта meganom-hotel.ru
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
